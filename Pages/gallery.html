    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet">
    <link rel="stylesheet" href="../Styles/styles.css">
    <link rel="stylesheet" href="../Styles/gallery.css">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  </head>
  <body>
    <header>
      <div class="brand">
        <div class="logo">
          <img src="../assets/Logo%20NGO.png" alt="Logo Ashram Gandhi Puri">
        </div>
      </div>
      <button
        class="hamburger"
        id="hamburger-btn"
        aria-label="Toggle navigation"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav id="main-nav">
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="gallery.html">Gallery</a></li>

        </ul>
      </nav>

    <main>
      <section class="gallery-section">
        <h2 class="gallery-title">Activity and Gallery</h2>
        <div class="gallery-control">
          <input
            type="text"
            id="search-input"
            placeholder="Search Activities..."
          />
          <select id="sort-select">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
          </select>
        </div>
        <div class="gallery-grid" id="gallery-container"></div>
      </section>
    </main>

    <footer>
      <div class="footer-content">
        <div class="footer-logo">
          <img src="../assets/Logo%20NGO.png" alt="Logo Ashram Gandhi Puri">
        </div>
        <div class="footer-right">
          <div class="footer-links-social">
            <ul class="footer-links">
              <li><a href="index.html">Home</a></li>
              <li><a href="gallery.html">Gallery</a></li>

            <div class="footer-socials">
              <a href="https://www.facebook.com/profile.php?id=100078784072776"
